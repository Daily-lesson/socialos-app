<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06060B">
  <meta name="description" content="SocialOS — AI-powered personal social media manager">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- CSP: no third-party scripts (Section 9 security rule) -->
  <!-- style-src needs 'unsafe-inline': UI templates set platform colors and
       progress widths via style attributes. Scripts stay locked to 'self'.
       No api.anthropic.com — all Claude calls MUST go through the Supabase
       Edge Function proxy (*.supabase.co), never directly.
       No www.linkedin.com/api.linkedin.com/www.reddit.com/oauth.reddit.com/
       www.tiktok.com/open.tiktokapis.com either (Phase 5, js/linkedin.js +
       js/reddit.js + js/tiktok.js) — deliberately absent.
       None of those endpoints set CORS headers for browser callers anyway
       (see docs/ROADMAP.md §2), so every LinkedIn/Reddit/TikTok call is
       relayed through one shared Supabase Edge Function (*.supabase.co,
       already allowed below); this CSP is what makes it impossible for a
       bug to accidentally call any of those platforms directly instead.
       The OAuth *authorize* redirect is a top-level navigation
       (window.location.href), not a fetch, so it isn't governed by
       connect-src at all — same for Google's accounts.google.com page.
       No oauth2.googleapis.com either: Google token exchange/refresh/revoke
       all happen server-side in the google-oauth Edge Function
       (*.supabase.co), so the client secret never exists in the browser and
       this CSP makes a direct token call impossible by construction. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src https://fonts.gstatic.com;
                 connect-src 'self' https://*.supabase.co https://www.googleapis.com https://photospicker.googleapis.com https://*.googleusercontent.com;
                 img-src 'self' data: blob: https:;">

  <title>SocialOS</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

  <!-- Fonts (Section 6 typography) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <div id="app">

    <!-- ═══ Landing Screen (signed-out / pre-onboarding) ═══ -->
    <div id="screen-landing" class="screen screen-full active">
      <div id="landing-content"></div>
    </div>

    <!-- ═══ Onboarding Screen ═══ -->
    <div id="screen-onboarding" class="screen">
      <div id="onboarding-content"></div>
    </div>

    <!-- ═══ Dashboard Screen ═══ -->
    <div id="screen-dashboard" class="screen">
      <div id="dashboard-content"></div>
    </div>

    <!-- ═══ Approvals Screen ═══ -->
    <div id="screen-approvals" class="screen">
      <div id="approvals-content"></div>
    </div>

    <!-- ═══ Calendar Screen ═══ -->
    <div id="screen-calendar" class="screen">
      <div id="calendar-content"></div>
    </div>

    <!-- ═══ Content Library Screen ═══ -->
    <div id="screen-library" class="screen">
      <div id="library-content"></div>
    </div>

    <!-- ═══ Projects Screen (Program Manager) ═══ -->
    <div id="screen-projects" class="screen">
      <div id="projects-content"></div>
    </div>

    <!-- ═══ Settings Screen ═══ -->
    <div id="screen-settings" class="screen">
      <div id="settings-content"></div>
    </div>

    <!-- ═══ Main Navigation — bottom bar on mobile, sidebar on desktop ═══ -->
    <nav id="main-nav" style="display:none" aria-label="Main">
      <div class="nav-brand" aria-hidden="true">
        <img class="nav-brand-mark" src="icons/logo.svg" alt="" width="34" height="34">
        <span class="nav-brand-name">Social<em>OS</em></span>
      </div>

      <div class="nav-tabs">
        <button class="nav-tab" data-screen="screen-dashboard">
          <span class="nav-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
          </span>
          <span class="nav-tab-label">Home</span>
        </button>
        <button class="nav-tab" data-screen="screen-approvals">
          <span class="nav-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
          <span class="nav-tab-label">Approvals</span>
          <span class="nav-badge" id="approval-badge">0</span>
        </button>
        <button class="nav-tab" data-screen="screen-calendar">
          <span class="nav-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>
          </span>
          <span class="nav-tab-label">Calendar</span>
        </button>
        <button class="nav-tab" data-screen="screen-library">
          <span class="nav-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="m21 16-4.5-4.5L9 19"/></svg>
          </span>
          <span class="nav-tab-label">Library</span>
        </button>
        <button class="nav-tab" data-screen="screen-projects">
          <span class="nav-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.6 5.3 5.9.8-4.3 4.1 1 5.8L12 16.3 6.8 19l1-5.8L3.5 9.1l5.9-.8L12 3z"/></svg>
          </span>
          <span class="nav-tab-label">Projects</span>
        </button>
        <button class="nav-tab" data-screen="screen-settings">
          <span class="nav-tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.98 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.98a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1.03-1.56V3a2 2 0 1 1 4 0v.09c0 .68.4 1.3 1.03 1.56a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9c.26.63.88 1.03 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.03z"/></svg>
          </span>
          <span class="nav-tab-label">Settings</span>
        </button>
      </div>
    </nav>

  </div>

  <!-- ═══ Overlays ═══ -->

  <!-- Hidden file input: "Upload from device" media source -->
  <input type="file" id="local-file-input" accept="image/*,video/*" multiple hidden>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-message">Loading...</div>
  </div>

  <!-- Bottom sheet (confirmations) -->
  <div id="bottom-sheet">
    <div id="bottom-sheet-content"></div>
  </div>

  <!-- Feedback: persistent entry point (self-healing feedback loop) -->
  <button id="feedback-fab" class="feedback-fab" data-action="open-feedback" aria-label="Send feedback">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-8 8H4l2-3a8 8 0 1 1 15-5z"/><path d="M9 11h6M9 14h3"/></svg>
  </button>

  <!-- ═══ Scripts (order matters — no modules, no bundler) ═══ -->
  <!-- self-healing.js has no dependencies and installs window.onerror /
       unhandledrejection from SocialOS.init(); it must load first so early
       errors during boot are still catchable. -->
  <script src="js/self-healing.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/db.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/google.js"></script>
  <script src="js/linkedin.js"></script>
  <script src="js/reddit.js"></script>
  <script src="js/tiktok.js"></script>
  <script src="js/linker.js"></script>
  <script src="js/pm.js"></script>
  <script src="js/engagement.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
